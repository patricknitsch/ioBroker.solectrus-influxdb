<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLECTRUS – InfluxDB</title>
    <script src="../../socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #388e3c;
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text: #212121;
            --text-muted: #757575;
            --border: #e0e0e0;
            --shadow: 0 1px 3px rgba(0,0,0,0.15);
            --radius: 8px;
        }
        body.dark {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --text-muted: #888;
            --border: #333;
            --shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        /* ── TOOLBAR ── */
        #toolbar {
            background: var(--primary);
            color: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 2px 4px rgba(0,0,0,.3);
        }
        #toolbar .logo {
            font-size: 18px;
            font-weight: 500;
            white-space: nowrap;
        }
        #toolbar .spacer { flex: 1; }
        .btn-toolbar {
            background: rgba(255,255,255,.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,.5);
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s;
            font-family: inherit;
        }
        .btn-toolbar:hover { background: rgba(255,255,255,.35); }
        #connStatus {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        #connStatus .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #9e9e9e;
            display: inline-block;
        }
        #connStatus.online .conn-dot  { background: #69f0ae; }
        #connStatus.offline .conn-dot { background: #ef5350; }

        /* ── MAIN ── */
        #main { padding: 16px; }

        /* ── ERROR ── */
        #error-msg {
            background: rgba(244,67,54,0.12);
            border: 1px solid rgba(244,67,54,0.4);
            color: #ef5350;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }

        /* ── LOADING ── */
        #loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* ── CONTENT ── */
        #content { display: none; }

        /* ── TAB DISABLED ── */
        #tab-disabled {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }
        #tab-disabled p { margin-bottom: 16px; }

        /* ── IFRAME PANEL ── */
        .iframe-panel {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .iframe-toolbar {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .iframe-cert-hint {
            font-size: 12px;
            color: var(--text-muted);
        }
        .iframe-open-btn {
            background: #4caf50;
            color: #fff;
            border: 1px solid #388e3c;
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }
        .iframe-open-btn:hover { background: #388e3c; }
        .iframe-placeholder {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 24px;
            font-size: 14px;
        }
        #dashboard-iframe {
            display: block;
            width: 100%;
            border: none;
            height: calc(100vh - 140px);
            min-height: 400px;
        }
        #helios-iframe {
            display: block;
            width: 100%;
            border: none;
            height: calc(100vh - 140px);
            min-height: 400px;
        }
        .iframe-section-gap {
            height: 16px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            #main { padding: 10px; }
        }
    </style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
    <div class="logo">⚡ SOLECTRUS InfluxDB</div>
    <div class="spacer"></div>
    <button class="btn-toolbar" id="config-btn"></button>
    <div id="connStatus">
        <span class="conn-dot"></span>
        <span id="connLabel"></span>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <div id="error-msg"></div>
    <div id="loading">…</div>
    <div id="content">

        <!-- Shown when showAdminTab is disabled in config -->
        <div id="tab-disabled" style="display:none">
            <p id="tab-disabled-msg"></p>
        </div>

        <!-- iFrame panel (shown when showAdminTab is enabled) -->
        <div id="iframe-wrap">
            <div class="iframe-panel">
                <div id="iframe-toolbar" class="iframe-toolbar" style="display:none">
                    <span id="iframe-cert-hint" class="iframe-cert-hint"></span>
                    <span id="iframe-http-hint" class="iframe-cert-hint"></span>
                    <a id="iframe-open-link" class="iframe-open-btn" target="_blank" rel="noopener noreferrer"></a>
                </div>
                <div id="iframe-placeholder" class="iframe-placeholder"></div>
                <iframe id="dashboard-iframe" style="display:none" sandbox="allow-scripts allow-forms allow-popups allow-same-origin allow-popups-to-escape-sandbox"></iframe>
            </div>
            <!-- HELIOS iFrame panel -->
            <div id="helios-wrap">
                <div class="iframe-section-gap"></div>
                <div class="iframe-panel">
                    <div id="helios-toolbar" class="iframe-toolbar" style="display:none">
                        <span id="helios-cert-hint" class="iframe-cert-hint"></span>
                        <a id="helios-open-link" class="iframe-open-btn" target="_blank" rel="noopener noreferrer"></a>
                    </div>
                    <iframe id="helios-iframe" style="display:none" sandbox="allow-scripts allow-forms allow-popups allow-same-origin allow-popups-to-escape-sandbox"></iframe>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
(function () {
    'use strict';

    /* ── i18n ── */
    var STRINGS = {
        en: {
            loading:            'Loading…',
            iframePlaceholder:  'No dashboard URL configured. Open the configuration and enter a URL in the iFrame tab.',
            iframeCertHint:     'Page not loading? SOLECTRUS blocks iframe embedding by default – add FRAME_ANCESTORS=http://your-iobroker-host:8081 to the SOLECTRUS .env file and restart the service.',
            iframeHttpHint:     'Note: The iframe is only visible when accessing the ioBroker admin via HTTP (not HTTPS).',
            iframeOpenBtn:      'Open in new tab',
            heliosOpenBtn:      'Open HELIOS in new tab',
            heliosCertHint:     'Page not loading? SOLECTRUS blocks iframe embedding by default – add FRAME_ANCESTORS=http://your-iobroker-host:8081 to the SOLECTRUS .env file and restart the service.',
            tabDisabledMsg:     'The Admin Tab is disabled in the adapter configuration. Open the configuration and enable "Show Admin Tab" to use the iFrame dashboard.',
            error:              'Error: ',
            noConn:             'Cannot connect to ioBroker socket.',
            configBtn:          'Open Configuration',
            connecting:         'Connecting…',
            connected:          'Connected',
            disconnected:       'Disconnected',
        },
        de: {
            loading:            'Lade…',
            iframePlaceholder:  'Keine Dashboard-URL konfiguriert. Öffne die Konfiguration und gib eine URL im iFrame-Tab ein.',
            iframeCertHint:     'Seite lädt nicht? SOLECTRUS blockiert das Einbetten in iFrames standardmäßig – füge FRAME_ANCESTORS=http://dein-iobroker-host:8081 in die SOLECTRUS-.env-Datei ein und starte den Dienst neu.',
            iframeHttpHint:     'Hinweis: Das iFrame ist nur sichtbar, wenn das ioBroker-Admin-Panel über HTTP (nicht HTTPS) aufgerufen wird.',
            iframeOpenBtn:      'In neuem Tab öffnen',
            heliosOpenBtn:      'HELIOS in neuem Tab öffnen',
            heliosCertHint:     'Seite lädt nicht? SOLECTRUS blockiert das Einbetten in iFrames standardmäßig – füge FRAME_ANCESTORS=http://dein-iobroker-host:8081 in die SOLECTRUS-.env-Datei ein und starte den Dienst neu.',
            tabDisabledMsg:     'Der Admin-Tab ist in der Adapterkonfiguration deaktiviert. Öffne die Konfiguration und aktiviere „Admin-Tab anzeigen", um das iFrame-Dashboard zu verwenden.',
            error:              'Fehler: ',
            noConn:             'Verbindung zum ioBroker-Socket nicht möglich.',
            configBtn:          'Konfiguration öffnen',
            connecting:         'Verbinde…',
            connected:          'Verbunden',
            disconnected:       'Getrennt',
        }
    };
    var lang = (navigator.language || 'en').slice(0, 2).toLowerCase();
    var T = STRINGS[lang] || STRINGS.en;

    /* ── constants ── */
    var SOCKET_TIMEOUT_MS   = 8000;
    var REFRESH_INTERVAL_MS = 5000;

    /* Track the last iframe URL to avoid reloading on every refresh tick */
    var iframeLoadedUrl = '';
    var heliosLoadedUrl = '';

    /* ── instance from URL ── */
    var params = new URLSearchParams(window.location.search);
    var instance = parseInt(params.get('instance') || '0', 10);
    if (isNaN(instance) || instance < 0) instance = 0;
    var NS = 'solectrus-influxdb.' + instance;

    /* ── theme ── */
    var DARK_THEME_NAMES = ['dark', 'blue'];

    function resolveTheme() {
        try {
            var t = localStorage.getItem('App.theme');
            if (t) return t === 'dark';
            var n = localStorage.getItem('App.themeName');
            if (n) return DARK_THEME_NAMES.indexOf(n) !== -1;
        } catch (_) {}
        try {
            var body = window.parent && window.parent !== window && window.parent.document && window.parent.document.body;
            var html = window.parent && window.parent !== window && window.parent.document && window.parent.document.documentElement;
            if (body) {
                if ((body.className  || '').toLowerCase().indexOf('dark') !== -1) return true;
                if (html && (html.className || '').toLowerCase().indexOf('dark') !== -1) return true;
                if (body.getAttribute('data-theme') === 'dark') return true;
                if (html && html.getAttribute('data-theme') === 'dark') return true;
                if (body.getAttribute('data-bs-theme') === 'dark') return true;
            }
        } catch (_) {}
        return false;
    }

    function applyTheme(isDark) {
        document.body.classList.toggle('dark', !!isDark);
    }

    function detectTheme() {
        try {
            var urlTheme = new URLSearchParams(window.location.search).get('react');
            if (urlTheme) { applyTheme(DARK_THEME_NAMES.indexOf(urlTheme) !== -1); return; }
        } catch (_) {}
        applyTheme(resolveTheme());
    }

    detectTheme();

    window.addEventListener('storage', function (e) {
        if (e.key === 'App.theme' || e.key === 'App.themeName') {
            applyTheme(resolveTheme());
        }
    });

    /* ── connection status ── */
    function setConnStatus(status) {
        var statusEl = document.getElementById('connStatus');
        var label    = document.getElementById('connLabel');
        statusEl.className = status;
        label.textContent = status === 'online'   ? T.connected
                          : status === 'offline'  ? T.disconnected
                          : T.connecting;
    }

    /* ── socket abstraction ── */
    var _sock = null;

    function _getObject(id) {
        var ps = _sock;
        if (ps && typeof ps.getObject === 'function') return ps.getObject(id);
        return new Promise(function (res, rej) {
            ps.emit('getObject', id, function (err, obj) { err ? rej(new Error(err)) : res(obj); });
        });
    }

    function initSocket() {
        try {
            var ps = window.parent && window.parent !== window && window.parent.socket;
            if (ps && (typeof ps.getObject === 'function' || typeof ps.emit === 'function')) {
                _sock = ps;
                return Promise.resolve();
            }
        } catch (_) {}

        if (typeof io === 'undefined') {
            return Promise.reject(new Error(T.noConn));
        }
        return new Promise(function (resolve, reject) {
            try {
                var s = io.connect();
                var addListener = typeof s.once === 'function' ? s.once.bind(s)
                                : typeof s.on   === 'function' ? s.on.bind(s)
                                : null;
                if (!addListener) { return reject(new Error(T.noConn)); }
                if (s.connected) { _sock = s; return resolve(); }
                var done = false;
                addListener('connect', function () {
                    if (done) return; done = true; _sock = s; resolve();
                });
                addListener('connect_error', function (e) {
                    if (done) return; done = true; reject(e);
                });
                setTimeout(function () {
                    if (!done) { done = true; reject(new Error('Socket timeout')); }
                }, SOCKET_TIMEOUT_MS);
            } catch (e) { reject(e); }
        });
    }

    /* ── render ── */
    function render(config) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        /* showAdminTab defaults to true when not set */
        var showTab = config.showAdminTab !== false;

        if (!showTab) {
            document.getElementById('tab-disabled').style.display = 'block';
            document.getElementById('tab-disabled-msg').textContent = T.tabDisabledMsg;
            document.getElementById('iframe-wrap').style.display = 'none';
            return;
        }

        document.getElementById('tab-disabled').style.display = 'none';
        document.getElementById('iframe-wrap').style.display = '';

        /* ── SOLECTRUS Dashboard iframe ── */
        var iframeUrl = (config.iframeUrl || '').trim();
        var iframeUrlSafe = /^https?:\/\//i.test(iframeUrl) ? iframeUrl : '';
        var iframeEl          = document.getElementById('dashboard-iframe');
        var iframePlaceholder = document.getElementById('iframe-placeholder');
        var iframeToolbar     = document.getElementById('iframe-toolbar');

        if (iframeUrlSafe) {
            if (iframeLoadedUrl !== iframeUrlSafe) {
                iframeEl.src = iframeUrlSafe;
                iframeLoadedUrl = iframeUrlSafe;
            }
            document.getElementById('iframe-cert-hint').textContent = T.iframeCertHint;
            document.getElementById('iframe-http-hint').textContent = T.iframeHttpHint;
            var openLink = document.getElementById('iframe-open-link');
            openLink.textContent = T.iframeOpenBtn;
            openLink.href = iframeUrlSafe;
            iframeToolbar.style.display = '';
            iframeEl.style.display = 'block';
            iframePlaceholder.style.display = 'none';
        } else {
            iframeToolbar.style.display = 'none';
            iframePlaceholder.textContent = T.iframePlaceholder;
            iframePlaceholder.style.display = 'block';
            iframeEl.style.display = 'none';
            iframeLoadedUrl = '';
        }

        /* ── HELIOS iframe ── */
        var heliosUrl = (config.heliosUrl || '').trim();
        var heliosUrlSafe = /^https?:\/\//i.test(heliosUrl) ? heliosUrl : '';
        var heliosWrap   = document.getElementById('helios-wrap');
        var heliosEl     = document.getElementById('helios-iframe');
        var heliosToolbar = document.getElementById('helios-toolbar');

        if (heliosUrlSafe) {
            heliosWrap.style.display = '';
            if (heliosLoadedUrl !== heliosUrlSafe) {
                heliosEl.src = heliosUrlSafe;
                heliosLoadedUrl = heliosUrlSafe;
            }
            document.getElementById('helios-cert-hint').textContent = T.heliosCertHint;
            var heliosOpenLink = document.getElementById('helios-open-link');
            heliosOpenLink.textContent = T.heliosOpenBtn;
            heliosOpenLink.href = heliosUrlSafe;
            heliosToolbar.style.display = '';
            heliosEl.style.display = 'block';
        } else {
            heliosWrap.style.display = 'none';
            heliosEl.style.display = 'none';
            heliosLoadedUrl = '';
        }
    }

    function showError(msg) {
        setConnStatus('offline');
        var e = document.getElementById('error-msg');
        e.textContent = T.error + msg;
        e.style.display = 'block';
        document.getElementById('loading').style.display = 'none';
    }

    /* ── config navigation ── */
    function openConfig() {
        var hash = 'tab-instances/config/system.adapter.' + NS;
        try {
            var target = (window.parent && window.parent !== window) ? window.parent : window;
            var base = target.location.href.split('#')[0];
            target.location.href = base + '#' + hash;
        } catch (_) {
            window.open('/index.html#' + hash, '_blank');
        }
    }
    document.getElementById('config-btn').addEventListener('click', openConfig);

    /* ── load ── */
    function load() {
        _getObject('system.adapter.' + NS)
            .then(function (obj) {
                if (!obj || !obj.native) {
                    throw new Error('Adapter object not found: system.adapter.' + NS);
                }
                setConnStatus('online');
                render(obj.native);
            })
            .catch(function (err) {
                showError(err && err.message ? err.message : String(err));
            });
    }

    /* ── init ── */
    document.getElementById('loading').textContent = T.loading;
    document.getElementById('config-btn').textContent = T.configBtn;
    setConnStatus('');

    initSocket()
        .then(function () {
            load();
            setInterval(load, REFRESH_INTERVAL_MS);
        })
        .catch(function (err) {
            showError(err && err.message ? err.message : T.noConn);
        });
}());
</script>
</body>
</html>
