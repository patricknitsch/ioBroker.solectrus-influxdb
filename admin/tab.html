<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLECTRUS – InfluxDB</title>
    <script src="../../socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #388e3c;
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text: #212121;
            --text-muted: #757575;
            --border: #e0e0e0;
            --code-bg: rgba(0,0,0,0.06);
            --shadow: 0 1px 3px rgba(0,0,0,0.15);
            --radius: 8px;
        }
        body.dark {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --text-muted: #888;
            --border: #333;
            --code-bg: rgba(255,255,255,0.08);
            --shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        /* ── TOOLBAR ── */
        #toolbar {
            background: var(--primary);
            color: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 2px 4px rgba(0,0,0,.3);
        }
        #toolbar .logo {
            font-size: 18px;
            font-weight: 500;
            white-space: nowrap;
        }
        #toolbar .spacer { flex: 1; }
        .btn-toolbar {
            background: rgba(255,255,255,.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,.5);
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s;
            font-family: inherit;
        }
        .btn-toolbar:hover { background: rgba(255,255,255,.35); }
        #connStatus {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        #connStatus .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #9e9e9e;
            display: inline-block;
        }
        #connStatus.online .conn-dot  { background: #69f0ae; }
        #connStatus.offline .conn-dot { background: #ef5350; }

        /* ── MAIN ── */
        #main { padding: 16px; }

        /* ── ERROR ── */
        #error-msg {
            background: rgba(244,67,54,0.12);
            border: 1px solid rgba(244,67,54,0.4);
            color: #ef5350;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }

        /* ── LOADING ── */
        #loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* ── CONTENT ── */
        #content { display: none; }

        /* ── TAB BAR ── */
        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        .tab-btn {
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            border-radius: 4px 4px 0 0;
            transition: color .15s, border-color .15s;
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── SECTION HEADER ── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary);
        }
        .section-header .icon { font-size: 18px; }

        /* ── SENSOR GRID ── */
        .sensor-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        .sensor-card {
            background: var(--bg);
            border-radius: 6px;
            border-left: 3px solid var(--primary);
            padding: 10px 12px;
            flex: 1 1 auto;
            min-width: max-content;
        }
        .sensor-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 5px;
        }
        .sensor-card-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            line-height: 1.3;
        }
        .sensor-type-badge {
            font-size: 10px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 3px;
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .sensor-card-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
            margin-bottom: 4px;
            min-height: 1.3em;
        }
        .sensor-card-value.na {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 400;
        }
        .sensor-card-value.json-val {
            font-size: 11px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        .sensor-card-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .sensor-card-source {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            overflow-wrap: break-word;
            word-break: break-all;
        }
        .sensor-grid-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 24px;
            font-size: 13px;
            grid-column: 1 / -1;
        }

        /* ── LAYOUT TOGGLE ── */
        .sensor-grid.layout-full .sensor-card {
            flex: 1 1 100%;
            min-width: 0;
        }

        /* ── IFRAME PANEL ── */
        .iframe-panel {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .iframe-toolbar {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .iframe-cert-hint {
            font-size: 12px;
            color: var(--text-muted);
        }
        .iframe-open-btn {
            background: #4caf50;
            color: #fff;
            border: 1px solid #388e3c;
            border-radius: 4px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }
        .iframe-open-btn:hover { background: #388e3c; }
        .iframe-placeholder {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 24px;
            font-size: 14px;
        }
        #dashboard-iframe {
            display: block;
            width: 100%;
            border: none;
            height: calc(100vh - 140px);
            min-height: 400px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            #main { padding: 10px; }
        }
    </style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
    <div class="logo">⚡ SOLECTRUS InfluxDB</div>
    <div class="spacer"></div>
    <button class="btn-toolbar" id="layout-btn"></button>
    <button class="btn-toolbar" id="config-btn"></button>
    <div id="connStatus">
        <span class="conn-dot"></span>
        <span id="connLabel"></span>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <div id="error-msg"></div>
    <div id="loading">…</div>
    <div id="content">
        <!-- TAB BAR -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="influx" id="tab-influx-btn"></button>
            <button class="tab-btn" data-tab="ds" id="tab-ds-btn" style="display:none"></button>
            <button class="tab-btn" data-tab="iframe" id="tab-iframe-btn" style="display:none"></button>
        </div>

        <!-- InfluxDB Sensors Tab -->
        <div class="tab-panel active" id="tab-influx">
            <div class="section-header">
                <span class="icon">📊</span>
                <span id="h-influx"></span>
            </div>
            <div id="sensor-grid" class="sensor-grid"></div>
        </div>

        <!-- Formula Engine Tab -->
        <div class="tab-panel" id="tab-ds">
            <div class="section-header">
                <span class="icon">🧮</span>
                <span id="h-ds"></span>
            </div>
            <div id="ds-grid" class="sensor-grid"></div>
        </div>

        <!-- iFrame Tab -->
        <div class="tab-panel" id="tab-iframe">
            <div class="iframe-panel">
                <div id="iframe-toolbar" class="iframe-toolbar" style="display:none">
                    <span id="iframe-cert-hint" class="iframe-cert-hint"></span>
                    <span id="iframe-http-hint" class="iframe-cert-hint"></span>
                    <a id="iframe-open-link" class="iframe-open-btn" target="_blank" rel="noopener noreferrer"></a>
                </div>
                <div id="iframe-placeholder" class="iframe-placeholder"></div>
                <iframe id="dashboard-iframe" style="display:none" sandbox="allow-scripts allow-forms allow-popups allow-same-origin allow-popups-to-escape-sandbox"></iframe>
            </div>
        </div>

        <div id="refresh-info"></div>
    </div>
</div>

<script>
(function () {
    'use strict';

    /* ── i18n ── */
    var STRINGS = {
        en: {
            loading:        'Loading…',
            hInflux:        'InfluxDB Sensors',
            hDs:            'Formula Engine (Data-SOLECTRUS)',
            tabInflux:      'InfluxDB Sensors',
            tabDs:          'Formula Engine',
            tabIframe:      'Dashboard',
            iframePlaceholder: 'No dashboard URL configured. Open the configuration and enter a URL in the iFrame tab.',
            iframeCertHint: 'Page not loading? SOLECTRUS blocks iframe embedding by default – add FRAME_ANCESTORS=http://your-iobroker-host:8081 to the SOLECTRUS .env file and restart the service.',
            iframeHttpHint: 'Note: The iframe is only visible when accessing the ioBroker admin via HTTP (not HTTPS).',
            iframeOpenBtn:  'Open in new tab',
            name:           'Name',
            stateId:        'Source State',
            type:           'Type',
            value:          'Current Value',
            measurement:    'Measurement',
            field:          'Field',
            mode:           'Mode',
            formula:        'Formula',
            na:             'n/a',
            noSensors:      'No active sensors configured.',
            noItems:        'No active items configured.',
            refreshed:      'Last updated: ',
            error:          'Error: ',
            noConn:         'Cannot connect to ioBroker socket.',
            moreEntries:    'more entries',
            configBtn:      'Open Configuration',
            layoutFlex:     'Flexible',
            layoutFull:     'Full Width',
            connecting:     'Connecting…',
            connected:      'Connected',
            disconnected:   'Disconnected',
        },
        de: {
            loading:        'Lade…',
            hInflux:        'InfluxDB-Sensoren',
            hDs:            'Formel-Engine (Data-SOLECTRUS)',
            tabInflux:      'InfluxDB-Sensoren',
            tabDs:          'Formel-Engine',
            tabIframe:      'Dashboard',
            iframePlaceholder: 'Keine Dashboard-URL konfiguriert. Öffne die Konfiguration und gib eine URL im iFrame-Tab ein.',
            iframeCertHint: 'Seite lädt nicht? SOLECTRUS blockiert das Einbetten in iFrames standardmäßig – füge FRAME_ANCESTORS=http://dein-iobroker-host:8081 in die SOLECTRUS-.env-Datei ein und starte den Dienst neu.',
            iframeHttpHint: 'Hinweis: Das iFrame ist nur sichtbar, wenn das ioBroker-Admin-Panel über HTTP (nicht HTTPS) aufgerufen wird.',
            iframeOpenBtn:  'In neuem Tab öffnen',
            name:           'Name',
            stateId:        'Quell-State',
            type:           'Typ',
            value:          'Aktueller Wert',
            measurement:    'Measurement',
            field:          'Field',
            mode:           'Modus',
            formula:        'Formel',
            na:             'k.A.',
            noSensors:      'Keine aktiven Sensoren konfiguriert.',
            noItems:        'Keine aktiven Elemente konfiguriert.',
            refreshed:      'Zuletzt aktualisiert: ',
            error:          'Fehler: ',
            noConn:         'Verbindung zum ioBroker-Socket nicht möglich.',
            moreEntries:    'weitere Einträge',
            configBtn:      'Konfiguration öffnen',
            layoutFlex:     'Flexibel',
            layoutFull:     'Ganze Breite',
            connecting:     'Verbinde…',
            connected:      'Verbunden',
            disconnected:   'Getrennt',
        }
    };
    var lang = (navigator.language || 'en').slice(0, 2).toLowerCase();
    var T = STRINGS[lang] || STRINGS.en;

    /* ── constants ── */
    var SOCKET_TIMEOUT_MS   = 8000;  /* ms to wait for socket.io to connect  */
    var REFRESH_INTERVAL_MS = 5000;  /* ms between data refreshes             */
    var TRUNCATE_VAL_LEN    = 60;    /* max chars for JSON value preview      */

    /* ── iframe state ── */
    /* Track the URL we last loaded into the iframe.  We cannot compare against
       iframeEl.src directly because the browser normalises the DOM property
       (e.g. trailing slash is added), causing the comparison to always fail and
       the iframe to reload on every REFRESH_INTERVAL_MS tick. */
    var iframeLoadedUrl = '';

    /* ── instance from URL ── */
    var params = new URLSearchParams(window.location.search);
    var instance = parseInt(params.get('instance') || '0', 10);
    if (isNaN(instance) || instance < 0) instance = 0;
    var NS = 'solectrus-influxdb.' + instance;

    /* ── theme ── */
    var DARK_THEME_NAMES = ['dark', 'blue'];

    function resolveTheme() {
        /* 1. localStorage keys written by ioBroker Admin Utils.setThemeName() */
        try {
            var t = localStorage.getItem('App.theme');
            if (t) return t === 'dark';
            var n = localStorage.getItem('App.themeName');
            if (n) return DARK_THEME_NAMES.indexOf(n) !== -1;
        } catch (_) { /* storage blocked */ }
        /* 2. DOM class / data-theme attributes of parent Admin frame */
        try {
            var body = window.parent && window.parent.document && window.parent.document.body;
            var html = window.parent && window.parent.document && window.parent.document.documentElement;
            if (body) {
                if ((body.className  || '').toLowerCase().indexOf('dark') !== -1) return true;
                if (html && (html.className || '').toLowerCase().indexOf('dark') !== -1) return true;
                if (body.getAttribute('data-theme') === 'dark') return true;
                if (html && html.getAttribute('data-theme') === 'dark') return true;
                if (body.getAttribute('data-bs-theme') === 'dark') return true;
            }
        } catch (_) { /* cross-origin */ }
        return false;
    }

    function applyTheme(isDark) {
        document.body.classList.toggle('dark', !!isDark);
    }

    function detectTheme() {
        /* Admin 7 appends &react=dark|light|blue|colored to the tab URL */
        try {
            var urlTheme = new URLSearchParams(window.location.search).get('react');
            if (urlTheme) { applyTheme(DARK_THEME_NAMES.indexOf(urlTheme) !== -1); return; }
        } catch (_) { /* ignore */ }
        applyTheme(resolveTheme());
    }

    detectTheme();

    /* Listen for theme changes from parent Admin (same-origin localStorage events) */
    window.addEventListener('storage', function (e) {
        if (e.key === 'App.theme' || e.key === 'App.themeName') {
            applyTheme(resolveTheme());
        }
    });

    /* ── tabs ── */
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
        document.querySelector('.tab-btn[data-tab="' + tab + '"]').classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            switchTab(btn.getAttribute('data-tab'));
        });
    });

    /* ── layout toggle ── */
    var LAYOUT_KEY = NS + '.layout';
    var _layoutFull = false;

    function applyLayout(full) {
        _layoutFull = !!full;
        document.querySelectorAll('.sensor-grid').forEach(function (g) {
            g.classList.toggle('layout-full', _layoutFull);
        });
        var btn = document.getElementById('layout-btn');
        if (btn) btn.textContent = _layoutFull ? T.layoutFlex : T.layoutFull;
        try { localStorage.setItem(LAYOUT_KEY, _layoutFull ? 'full' : 'flex'); } catch (_) {}
    }

    document.getElementById('layout-btn').addEventListener('click', function () {
        applyLayout(!_layoutFull);
    });

    /* ── connection status ── */
    function setConnStatus(status) {
        var statusEl = document.getElementById('connStatus');
        var label    = document.getElementById('connLabel');
        statusEl.className = status;
        label.textContent = status === 'online'   ? T.connected
                          : status === 'offline'  ? T.disconnected
                          : T.connecting;
    }

    /* ── DOM helpers ── */
    function el(tag, opts) {
        var e = document.createElement(tag);
        if (opts) {
            if (opts.text)  e.textContent   = opts.text;
            if (opts.html)  e.innerHTML     = opts.html;
            if (opts.cls)   e.className     = opts.cls;
            if (opts.span)  e.colSpan       = opts.span;
            if (opts.style) e.style.cssText = opts.style;
        }
        return e;
    }
    function setText(id, txt) { document.getElementById(id).textContent = txt; }

    /* ── state-ID helpers ── */
    function sensorStateId(sensor) {
        var name = (sensor.SensorName || '').toLowerCase().replace(/[^a-z0-9]+/g, '_');
        return NS + '.sensors.' + name;
    }
    function dsItemStateId(item) {
        var group = (item.group || '').trim();
        var tid   = (item.targetId || '').trim();
        if (!tid) return null;
        return NS + '.ds.' + (group ? group + '.' + tid : tid);
    }
    function dsFormulaText(item) {
        var mode = item.mode || 'formula';
        if (mode === 'formula')                      return item.formula || '';
        if (mode === 'source' || mode === 'sourceState') return item.sourceState || '';
        if (mode === 'jsonPath')  return (item.sourceState || '') + (item.jsonPath ? ' → ' + item.jsonPath : '');
        if (mode === 'state-machine') return '[state-machine]';
        return '';
    }
    function dsModeLabel(item) {
        var m = { formula: 'Formula', source: 'Source', sourceState: 'Source',
                  jsonPath: 'JSONPath', 'state-machine': 'State Machine' };
        return m[item.mode || 'formula'] || (item.mode || 'formula');
    }
    function fmtVal(val) {
        if (val === null || val === undefined) return T.na;
        if (typeof val === 'boolean') return val ? 'true' : 'false';
        if (typeof val === 'object')  return JSON.stringify(val).slice(0, TRUNCATE_VAL_LEN);
        return String(val);
    }
    /* Compact formatter for sensor values: JSON arrays show first entry + "+N more" */
    function fmtSensorVal(val, isJson) {
        if (val === null || val === undefined) return T.na;
        if (isJson) {
            /* val may be a raw JSON string from ioBroker */
            var parsed = val;
            if (typeof val === 'string') {
                try { parsed = JSON.parse(val); } catch (_) { /* keep as string */ }
            }
            if (Array.isArray(parsed)) {
                if (parsed.length === 0) return '[]';
                var firstStr = JSON.stringify(parsed[0]);
                if (firstStr.length > TRUNCATE_VAL_LEN) {
                    firstStr = firstStr.slice(0, TRUNCATE_VAL_LEN) + '…';
                }
                if (parsed.length === 1) return firstStr;
                return firstStr + ' (+' + (parsed.length - 1) + '\u00a0' + T.moreEntries + ')';
            }
        }
        return fmtVal(val);
    }

    /* ── socket abstraction ── */
    var _sock = null;

    function _getObject(id) {
        var ps = _sock;
        if (ps && typeof ps.getObject === 'function') return ps.getObject(id);
        return new Promise(function (res, rej) {
            ps.emit('getObject', id, function (err, obj) { err ? rej(new Error(err)) : res(obj); });
        });
    }
    function _getStates(pattern) {
        var ps = _sock;
        if (ps && typeof ps.getStates === 'function') return ps.getStates(pattern);
        return new Promise(function (res, rej) {
            ps.emit('getForeignStates', pattern, function (err, states) { err ? rej(new Error(err)) : res(states || {}); });
        });
    }

    function initSocket() {
        /* Strategy 1 – reuse parent admin socket (admin v7+) */
        try {
            var ps = window.parent && window.parent !== window && window.parent.socket;
            if (ps && (typeof ps.getObject === 'function' || typeof ps.emit === 'function')) {
                _sock = ps;
                return Promise.resolve();
            }
        } catch (_) { /* cross-origin – ignore */ }

        /* Strategy 2 – create a fresh socket.io connection */
        if (typeof io === 'undefined') {
            return Promise.reject(new Error(T.noConn));
        }
        return new Promise(function (resolve, reject) {
            try {
                var s = io.connect();
                /* ioBroker Admin v7 socket client exposes .on() but not .once() */
                var addListener = typeof s.once === 'function' ? s.once.bind(s)
                                : typeof s.on   === 'function' ? s.on.bind(s)
                                : null;
                if (!addListener) { return reject(new Error(T.noConn)); }
                /* socket might already be connected (no 'connect' event will fire) */
                if (s.connected) { _sock = s; return resolve(); }
                var done = false;
                addListener('connect', function () {
                    if (done) return; done = true; _sock = s; resolve();
                });
                addListener('connect_error', function (e) {
                    if (done) return; done = true; reject(e);
                });
                /* timeout fallback */
                setTimeout(function () {
                    if (!done) { done = true; reject(new Error('Socket timeout')); }
                }, SOCKET_TIMEOUT_MS);
            } catch (e) { reject(e); }
        });
    }

    /* ── render ── */
    function renderInflux(sensors, states) {
        setText('h-influx', T.hInflux);

        var grid = document.getElementById('sensor-grid');
        grid.innerHTML = '';
        var active = (sensors || []).filter(function (s) { return s && s.enabled && s.SensorName; });
        if (!active.length) {
            var empty = document.createElement('div');
            empty.className = 'sensor-grid-empty';
            empty.textContent = T.noSensors;
            grid.appendChild(empty);
            return;
        }
        active.forEach(function (sensor) {
            var sid    = sensorStateId(sensor);
            var state  = states && states[sid];
            var hasVal = state && state.val !== null && state.val !== undefined;
            var isJson = sensor.type === 'json';
            var valText = fmtSensorVal(hasVal ? state.val : null, isJson);

            var card = document.createElement('div');
            card.className = 'sensor-card';

            /* header: name + type badge */
            var header = document.createElement('div');
            header.className = 'sensor-card-header';
            var nameEl = document.createElement('span');
            nameEl.className = 'sensor-card-name';
            nameEl.textContent = sensor.SensorName;
            header.appendChild(nameEl);
            if (sensor.type) {
                var badge = document.createElement('span');
                badge.className = 'sensor-type-badge';
                badge.textContent = sensor.type;
                header.appendChild(badge);
            }
            card.appendChild(header);

            /* value */
            var valEl = document.createElement('div');
            var valCls = 'sensor-card-value';
            if (!hasVal) {
                valCls += ' na';
            } else if (isJson) {
                valCls += ' json-val';
            }
            valEl.className = valCls;
            valEl.textContent = valText;
            card.appendChild(valEl);

            /* measurement: field */
            if (sensor.measurement || sensor.field) {
                var metaEl = document.createElement('div');
                metaEl.className = 'sensor-card-meta';
                metaEl.textContent = (sensor.measurement || '') + (sensor.field ? ': ' + sensor.field : '');
                card.appendChild(metaEl);
            }

            /* source state */
            if (sensor.sourceState) {
                var srcEl = document.createElement('div');
                srcEl.className = 'sensor-card-source';
                srcEl.textContent = sensor.sourceState;
                srcEl.title = sensor.sourceState;
                card.appendChild(srcEl);
            }

            grid.appendChild(card);
        });
    }

    function renderDs(items, states) {
        setText('h-ds', T.hDs);

        var grid = document.getElementById('ds-grid');
        grid.innerHTML = '';
        var active = (items || []).filter(function (it) { return it && it.enabled && it.targetId; });
        if (!active.length) {
            var empty = document.createElement('div');
            empty.className = 'sensor-grid-empty';
            empty.textContent = T.noItems;
            grid.appendChild(empty);
            return;
        }
        active.forEach(function (item) {
            var sid    = dsItemStateId(item);
            if (!sid) return;
            var state  = states && states[sid];
            var hasVal = state && state.val !== null && state.val !== undefined;
            var valText = fmtVal(hasVal ? state.val : null);

            var card = document.createElement('div');
            card.className = 'sensor-card';

            /* header: name + mode badge */
            var header = document.createElement('div');
            header.className = 'sensor-card-header';
            var nameEl = document.createElement('span');
            nameEl.className = 'sensor-card-name';
            nameEl.textContent = item.name || item.targetId;
            header.appendChild(nameEl);
            var badge = document.createElement('span');
            badge.className = 'sensor-type-badge';
            badge.textContent = dsModeLabel(item);
            header.appendChild(badge);
            card.appendChild(header);

            /* value */
            var valEl = document.createElement('div');
            var valCls = 'sensor-card-value';
            if (!hasVal) {
                valCls += ' na';
            }
            valEl.className = valCls;
            valEl.textContent = valText;
            card.appendChild(valEl);

            /* state id */
            var metaEl = document.createElement('div');
            metaEl.className = 'sensor-card-meta';
            metaEl.textContent = sid;
            metaEl.title = sid;
            card.appendChild(metaEl);

            /* formula / expression */
            var expr = dsFormulaText(item);
            if (expr) {
                var srcEl = document.createElement('div');
                srcEl.className = 'sensor-card-source';
                srcEl.textContent = expr;
                srcEl.title = expr;
                card.appendChild(srcEl);
            }

            grid.appendChild(card);
        });
    }

    function render(config, states) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        /* update tab labels */
        setText('tab-influx-btn', T.tabInflux);
        setText('tab-ds-btn',     T.tabDs);
        setText('tab-iframe-btn', T.tabIframe);

        renderInflux(config.sensors, states);

        if (config.enableDataSolectrus) {
            document.getElementById('tab-ds-btn').style.display = '';
            renderDs(config.dsItems, states);
        } else {
            document.getElementById('tab-ds-btn').style.display = 'none';
            /* if Formula Engine tab was active, switch back to InfluxDB tab */
            if (document.getElementById('tab-ds').classList.contains('active')) {
                switchTab('influx');
            }
        }

        var iframeUrl = (config.iframeUrl || '').trim();
        /* Only allow http/https to prevent javascript: / data: injection */
        var iframeUrlSafe = /^https?:\/\//i.test(iframeUrl) ? iframeUrl : '';
        var iframeEl = document.getElementById('dashboard-iframe');
        var iframePlaceholder = document.getElementById('iframe-placeholder');
        var iframeToolbar = document.getElementById('iframe-toolbar');
        if (iframeUrlSafe) {
            document.getElementById('tab-iframe-btn').style.display = '';
            if (iframeLoadedUrl !== iframeUrlSafe) {
                iframeEl.src = iframeUrlSafe;
                iframeLoadedUrl = iframeUrlSafe;
            }
            /* toolbar: cert hint + http hint + open-in-new-tab link */
            document.getElementById('iframe-cert-hint').textContent = T.iframeCertHint;
            document.getElementById('iframe-http-hint').textContent = T.iframeHttpHint;
            var openLink = document.getElementById('iframe-open-link');
            openLink.textContent = T.iframeOpenBtn;
            openLink.href = iframeUrlSafe;
            iframeToolbar.style.display = '';
            iframeEl.style.display = 'block';
            iframePlaceholder.style.display = 'none';
        } else {
            document.getElementById('tab-iframe-btn').style.display = 'none';
            iframeToolbar.style.display = 'none';
            iframePlaceholder.textContent = T.iframePlaceholder;
            iframePlaceholder.style.display = 'block';
            iframeEl.style.display = 'none';
            iframeLoadedUrl = '';  /* reset so re-enabling the URL loads fresh */
            /* if iFrame tab was active, switch back to InfluxDB tab */
            if (document.getElementById('tab-iframe').classList.contains('active')) {
                switchTab('influx');
            }
        }

        document.getElementById('refresh-info').textContent =
            T.refreshed + new Date().toLocaleTimeString();
    }

    function showError(msg) {
        setConnStatus('offline');
        var e = document.getElementById('error-msg');
        e.textContent = T.error + msg;
        e.style.display = 'block';
        document.getElementById('loading').style.display = 'none';
    }

    /* ── config navigation ── */
    function openConfig() {
        var hash = 'tab-instances/config/system.adapter.' + NS;
        try {
            var target = (window.parent && window.parent !== window) ? window.parent : window;
            var base = target.location.href.split('#')[0];
            target.location.href = base + '#' + hash;
        } catch (_) {
            /* cross-origin fallback: open in new tab */
            window.open('/index.html#' + hash, '_blank');
        }
    }
    document.getElementById('config-btn').addEventListener('click', openConfig);

    /* ── load ── */
    function load() {
        _getObject('system.adapter.' + NS)
            .then(function (obj) {
                if (!obj || !obj.native) {
                    throw new Error('Adapter object not found: system.adapter.' + NS);
                }
                return _getStates(NS + '.*').then(function (states) {
                    setConnStatus('online');
                    render(obj.native, states || {});
                });
            })
            .catch(function (err) {
                showError(err && err.message ? err.message : String(err));
            });
    }

    /* ── init ── */
    setText('loading',    T.loading);
    setText('config-btn', T.configBtn);
    setConnStatus('');

    var _savedLayout = 'flex';
    try { _savedLayout = localStorage.getItem(LAYOUT_KEY) || 'flex'; } catch (_) {}
    applyLayout(_savedLayout === 'full');

    initSocket()
        .then(function () {
            load();
            setInterval(load, REFRESH_INTERVAL_MS);
        })
        .catch(function (err) {
            showError(err && err.message ? err.message : T.noConn);
        });
}());
</script>
</body>
</html>
